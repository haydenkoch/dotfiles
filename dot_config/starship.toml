# ~/.config/starship.toml
# Minimal two-line prompt — Dracula colors

format = """
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$line_break\
$character"""

# ── Directory ─────────────────────────────────────────
[directory]
style = "bold #bd93f9"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 󰌾"
read_only_style = "#ff5555"

[directory.substitutions]
"~/dev/work" = " work"
"~/dev/personal" = " personal"
"~/dev/learning" = "󰑴 learning"
"Documents" = "󰈙 docs"

# ── Git ───────────────────────────────────────────────
[git_branch]
style = "#ff79c6"
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "

[git_status]
style = "#f1fa8c"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇢${count}"
diverged = "⇡${ahead_count}⇢${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

# ── Right side: command duration ──────────────────────
[fill]
symbol = " "

[cmd_duration]
style = "#6272a4"
min_time = 2_000
format = "[$duration]($style)"

# ── Prompt character (bottom line) ────────────────────
[character]
success_symbol = "[❯](bold #50fa7b)"
error_symbol = "[❯](bold #ff5555)"

# ── Disable everything else ───────────────────────────
[nodejs]
disabled = true

[python]
disabled = true

