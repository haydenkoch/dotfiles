# ── General ───────────────────────────────────────────
set -g mouse on
set -g history-limit 100000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-clipboard on

# ── Prefix ───────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Terminal capabilities ────────────────────────────
# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB"
# Undercurl + colored underline (for neovim LSP diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── Splits ───────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (hjkl) ──────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize (HJKL, repeatable) ──────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Vi copy mode + clipboard ────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Reload ───────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# ── Dracula status bar ──────────────────────────────
# Palette: bg=#282a36 fg=#f8f8f2 purple=#bd93f9
#          selection=#44475a comment=#6272a4
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#282a36,fg=#f8f8f2"
set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#282a36] "
set -g status-left-length 30
set -g status-right "#[fg=#6272a4] %H:%M "
set -g window-status-format "#[fg=#6272a4] #I:#W "
set -g window-status-current-format "#[fg=#f8f8f2,bg=#44475a,bold] #I:#W "
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
set -g message-style "bg=#44475a,fg=#f8f8f2"
