# ── General ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g escape-time 0
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g focus-events on

# ── Prefix ────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Navigation ────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize ────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload ────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# ── Dracula colors ────────────────────────────────────
drc_bg="#282a36"
drc_fg="#f8f8f2"
drc_sel="#44475a"
drc_comment="#6272a4"
drc_cyan="#8be9fd"
drc_green="#50fa7b"
drc_orange="#ffb86c"
drc_pink="#ff79c6"
drc_purple="#bd93f9"
drc_red="#ff5555"
drc_yellow="#f1fa8c"

# ── Status bar ────────────────────────────────────────
set -g status-position top
set -g status-style "bg=${drc_bg},fg=${drc_fg}"
set -g status-interval 5

# left: session name
set -g status-left-length 30
set -g status-left "#[fg=${drc_bg},bg=${drc_purple},bold]  #S #[fg=${drc_purple},bg=${drc_bg}] "

# right: date + time
set -g status-right-length 60
set -g status-right "#[fg=${drc_comment}]%a %b %d #[fg=${drc_fg}]%H:%M "

# window tabs
set -g window-status-format "#[fg=${drc_comment}] #I #W "
set -g window-status-current-format "#[fg=${drc_bg},bg=${drc_pink},bold] #I #W #[fg=${drc_pink},bg=${drc_bg}]"
set -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=${drc_sel}"
set -g pane-active-border-style "fg=${drc_purple}"

# messages
set -g message-style "bg=${drc_sel},fg=${drc_fg}"
set -g message-command-style "bg=${drc_sel},fg=${drc_fg}"

# copy mode
setw -g mode-style "bg=${drc_sel},fg=${drc_fg}"